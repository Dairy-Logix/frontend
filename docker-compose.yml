version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: dairy-logix-frontend
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3001/api
      - NEXT_PUBLIC_WS_URL=ws://backend:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3002
      - NEXT_PUBLIC_ENABLE_REACT_QUERY_DEVTOOLS=true
    depends_on:
      - backend
    networks:
      - dairy-logix-network
    restart: unless-stopped

  # Backend API (placeholder - to be configured when backend is set up)
  backend:
    image: node:20-alpine
    container_name: dairy-logix-backend
    working_dir: /app
    command: echo "Backend service placeholder - Configure when backend is ready"
    ports:
      - "3001:3001"
    networks:
      - dairy-logix-network
    # Uncomment when backend is ready
    # volumes:
    #   - ../backend:/app
    #   - /app/node_modules
    # environment:
    #   - NODE_ENV=development
    #   - DATABASE_URL=postgresql://dairy_user:dairy_pass@postgres:5432/dairy_logix
